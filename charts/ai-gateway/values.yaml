replicaCount: 1

image:
  repository: ghcr.io/pavelsamodurov/ai-gateway
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

ingress:
  enabled: false
  host: resonancelab.cc
  path: /ai-gateway
  certIssuer: letsencrypt-prod
  annotations: {}

# Secrets — populated at deploy time via --set-string, stored in a Kubernetes Secret
deepseekApiKey: ""
groqApiKey: ""
deepinfraApiKey: ""
postgresUser: ""
postgresPassword: ""
sttMaxToken: ""

# Populated at deploy time via --set-file applicationConfig=environments/<env>/application-env.yaml
applicationConfig: ""

fluentbit:
  enabled: true
  # Loki host — overridden per environment
  lokiHost: "loki.dev.svc.cluster.local"
  lokiPort: 3100
  # env label value pushed to Loki — overridden per environment
  env: "dev"
  # Must match the path where Spring Boot writes logs (relative to WORKDIR in Dockerfile)
  logsPath: "/app/logs"
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 50m
      memory: 64Mi