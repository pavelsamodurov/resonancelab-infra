replicaCount: 1

image:
  repository: ghcr.io/pavelsamodurov/ai-gateway
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Populated at deploy time via --set-file applicationConfig=environments/<env>/application-env.yaml
applicationConfig: ""