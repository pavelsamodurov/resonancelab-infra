replicaCount: 1

image:
  repository: ghcr.io/pavelsamodurov/ai-gateway
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

ingress:
  enabled: false
  host: resonancelab.cc
  path: /ai-gateway
  # Name of the k8s Secret containing Cloudflare Origin Certificate
  # kubectl create secret tls <name> --cert=cert.pem --key=key.pem -n <namespace>
  tlsSecret: resonancelab-tls
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "300"
    nginx.ingress.kubernetes.io/upstream-keepalive-timeout: "3600"

    # Recommended for SSE
    nginx.ingress.kubernetes.io/server-snippet: |
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    nginx.ingress.kubernetes.io/eventsource: "true"   # helps nginx understand that it is SSE

# Populated at deploy time via --set deepseekApiKey=<secret>
deepseekApiKey: ""

# Populated at deploy time via --set-file applicationConfig=environments/<env>/application-env.yaml
applicationConfig: ""