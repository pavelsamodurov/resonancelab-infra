replicaCount: 1

image:
  repository: ghcr.io/pavelsamodurov/ai-gateway
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

ingress:
  enabled: false
  host: resonancelab.cc
  path: /ai-gateway
  certIssuer: letsencrypt-prod
  annotations: {}

# Secrets — populated at deploy time via --set-string, stored in a Kubernetes Secret
deepseekApiKey: ""
groqApiKey: ""
deepinfraApiKey: ""
postgresUser: ""
postgresPassword: ""
sttMaxToken: ""

# Populated at deploy time via --set-file applicationConfig=environments/<env>/application-env.yaml
applicationConfig: ""