apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-gateway.fullname" . }}
  labels:
    {{- include "ai-gateway.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ai-gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ai-gateway.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - secretRef:
                name: {{ include "ai-gateway.fullname" . }}-secrets
          env:
            - name: SPRING_CONFIG_ADDITIONAL_LOCATION
              value: /app/config/
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: management
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: management
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: management
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: app-config
              mountPath: /app/config/
              readOnly: true
            {{- if .Values.fluentbit.enabled }}
            - name: logs
              mountPath: {{ .Values.fluentbit.logsPath }}
            {{- end }}
        {{- if .Values.fluentbit.enabled }}
        - name: fluent-bit
          image: fluent/fluent-bit:5.0.3
          resources:
            {{- toYaml .Values.fluentbit.resources | nindent 12 }}
          volumeMounts:
            - name: logs
              mountPath: {{ .Values.fluentbit.logsPath }}
            - name: fluent-bit-config
              mountPath: /fluent-bit/etc
              readOnly: true
        {{- end }}
      volumes:
        - name: app-config
          configMap:
            name: {{ include "ai-gateway.fullname" . }}-config
        {{- if .Values.fluentbit.enabled }}
        - name: logs
          emptyDir: {}
        - name: fluent-bit-config
          configMap:
            name: {{ include "ai-gateway.fullname" . }}-fluent-bit
        {{- end }}