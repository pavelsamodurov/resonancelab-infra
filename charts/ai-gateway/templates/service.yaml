apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-gateway.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "ai-gateway.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: 8081
      targetPort: management
      protocol: TCP
      name: management
  selector:
    app.kubernetes.io/name: {{ include "ai-gateway.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}