spring:
  application:
    name: ai-gateway-prod
  datasource:
    url: jdbc:postgresql://postgres:5432/resonance
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  ai:
    ollama:
      base-url: http://ollama:11434
    deepseek:
      api-key: ${DEEPSEEK_API_KEY}

ai:
  routing:
    ttl: PT1H
    phases:
      - provider: "ollama"

transcription:
  routing:
    ttl: PT1H
    phases:
      - provider: "groq"
  groq:
    api-key: ${GROQ_API_KEY}
    model: whisper-large-v3-turbo
  deepinfra:
    api-key: ${DEEPINFRA_API_KEY}
    model: openai/whisper-large-v3-turbo

upstream:
  max:
    url: https://platform-api.max.ru
    sst-bot-token: ${STT_MAX_TOKEN}

webhook:
  url: "https://resonancelab.cc/ai-gateway/webhook"
  subscription:
    enabled: true

logging:
  level:
    root: INFO
    cc.resonancelab.ai.gateway: DEBUG
    org.springframework.ai.chat.client.advisor: DEBUG

integration:
  logging:
    enabled: true
    http:
      log-body: true
      max-body-size: 4096
    ai:
      enabled: true
    sql:
      enabled: true
      log-query: true