spring:
  application:
    name: ai-gateway-prod
  datasource:
    url: jdbc:postgresql://postgres:5432/resonance
  ai:
    ollama:
      base-url: http://ollama:11434

ai:
  routing:
    ttl: PT1H
    phases:
      - provider: "ollama"

transcription:
  routing:
    ttl: PT1H
    phases:
      - provider: "groq"
  groq:
    model: whisper-large-v3-turbo
  deepinfra:
    model: openai/whisper-large-v3-turbo

logging:
  level:
    root: INFO
    cc.resonancelab.ai.gateway: DEBUG
    org.springframework.ai.chat.client.advisor: DEBUG