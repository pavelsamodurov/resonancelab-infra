spring:
  application:
    name: ai-gateway-dev
  datasource:
    url: jdbc:postgresql://postgres:5432/resonance
ai:
  routing:
    ttl: PT1H
    phases:
      - provider: "deepseek-chat"
        requests: 1
      - provider: "ollama"

logging:
  level:
    root: INFO
    cc.resonancelab.ai.gateway: DEBUG
    org.springframework.ai.chat.client.advisor: DEBUG