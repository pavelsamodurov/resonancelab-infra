apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      initContainers:
        - name: pull-model
          image: ollama/ollama:latest
          command:
            - sh
            - -c
            - |
              ollama serve &
              SERVER_PID=$!
              echo "Waiting for Ollama server to start..."
              until curl -s http://127.0.0.1:11434/api/tags > /dev/null; do
                sleep 2
              done
              echo "Ollama server is ready. Pulling model ${OLLAMA_MODEL}..."
              ollama pull ${OLLAMA_MODEL}
              echo "Model pulled successfully. Shutting down server..."
              kill $SERVER_PID
              wait $SERVER_PID 2>/dev/null || true
          env:
            - name: OLLAMA_MODEL
              valueFrom:
                configMapKeyRef:
                  name: ollama-config
                  key: OLLAMA_MODEL
            - name: OLLAMA_MODELS
              value: /models
          volumeMounts:
            - name: ollama-models
              mountPath: /models
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - name: http
              containerPort: 11434
              protocol: TCP
          env:
            - name: OLLAMA_MODELS
              value: /models
          readinessProbe:
            httpGet:
              path: /api/tags
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/tags
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 3Gi
          volumeMounts:
            - name: ollama-models
              mountPath: /models
      volumes:
        - name: ollama-models
          persistentVolumeClaim:
            claimName: ollama-models-pvc