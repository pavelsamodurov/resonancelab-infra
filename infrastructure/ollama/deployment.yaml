apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      initContainers:
        - name: pull-model
          image: ollama/ollama:latest
          command:
            - sh
            - -c
            - |
              ollama serve &
              SERVER_PID=$!
              echo "Waiting 20 seconds for Ollama server to start..."
              sleep 20
              echo "Pulling model ${OLLAMA_MODEL}..."
              ollama pull ${OLLAMA_MODEL}
              echo "Model pull finished. Shutting down server..."
              kill $SERVER_PID 2>/dev/null || true
              wait $SERVER_PID 2>/dev/null || true
              echo "Init container completed successfully."
          env:
            - name: OLLAMA_MODEL
              valueFrom:
                configMapKeyRef:
                  name: ollama-config
                  key: OLLAMA_MODEL
            - name: OLLAMA_MODELS
              value: /models
          volumeMounts:
            - name: ollama-models
              mountPath: /models
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - name: http
              containerPort: 11434
              protocol: TCP
          env:
            - name: OLLAMA_MODELS
              value: /models
            - name: OLLAMA_NUM_THREAD
              value: "6"
            - name: OLLAMA_NUM_PARALLEL
              value: "4"
            - name: OLLAMA_MAX_QUEUE
              value: "10"
            - name: OLLAMA_KEEP_ALIVE
              value: "-1"
            - name: OLLAMA_FLASH_ATTENTION
              value: "1"
            - name: OLLAMA_CONTEXT_LENGTH
              value: "2048"
          readinessProbe:
            httpGet:
              path: /api/tags
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/tags
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: 4000m
              memory: 5Gi
          volumeMounts:
            - name: ollama-models
              mountPath: /models
      volumes:
        - name: ollama-models
          persistentVolumeClaim:
            claimName: ollama-models-pvc