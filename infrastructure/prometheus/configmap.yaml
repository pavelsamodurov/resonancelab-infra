apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yaml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'ai-gateway'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['ai-gateway:8081']
