name: Teardown Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (dev | prod)'
        required: true
        type: choice
        options:
          - dev
          - prod
      component:
        description: 'Infrastructure component to teardown'
        required: true
        type: choice
        options:
          - pgadmin
          - ollama

jobs:
  teardown:
    name: Teardown ${{ inputs.component }} → ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read

    steps:
      - name: Checkout infra charts
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          repository: pavelsamodurov/resonancelab-infra
          ref: main

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Teardown pgadmin
        if: inputs.component == 'pgadmin'
        run: |
          kubectl delete -f infrastructure/pgadmin/ \
            --namespace=${{ inputs.environment }} \
            --ignore-not-found
          kubectl delete secret pgadmin-secret \
            --namespace=${{ inputs.environment }} \
            --ignore-not-found

      - name: Teardown ollama
        if: inputs.component == 'ollama'
        run: |
          kubectl delete -f infrastructure/ollama/ \
            --namespace=${{ inputs.environment }} \
            --ignore-not-found
          kubectl delete configmap ollama-config \
            --namespace=${{ inputs.environment }} \
            --ignore-not-found