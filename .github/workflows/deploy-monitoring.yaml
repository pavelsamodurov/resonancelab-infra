name: Deploy Monitoring

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (dev | prod)'
        required: true
        type: choice
        options:
          - dev
          - prod
      component:
        description: 'Monitoring component to deploy'
        required: true
        type: choice
        options:
          - loki
          - grafana
      recreate:
        description: 'Teardown component before deploying'
        required: false
        type: boolean
        default: false

jobs:
  deploy:
    name: Deploy ${{ inputs.component }} → monitoring-${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read

    steps:
      - name: Checkout infra charts
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          repository: pavelsamodurov/resonancelab-infra
          ref: main

      - name: Install yq
        uses: mikefarah/yq@f15500b20a1c991c8729870ba60a4dc3524b6a94  # v4.45.1

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Create monitoring namespace
        run: |
          kubectl create namespace monitoring-${{ inputs.environment }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Teardown before deploy
        if: inputs.recreate == true
        run: |
          kubectl delete statefulset loki \
            --namespace=monitoring-${{ inputs.environment }} \
            --ignore-not-found
          kubectl delete deployment grafana \
            --namespace=monitoring-${{ inputs.environment }} \
            --ignore-not-found
          kubectl delete configmap loki-config grafana-datasources \
            --namespace=monitoring-${{ inputs.environment }} \
            --ignore-not-found
          kubectl delete secret grafana-secret \
            --namespace=monitoring-${{ inputs.environment }} \
            --ignore-not-found

      # ── Loki ──────────────────────────────────────────────────────────────

      - name: Deploy loki
        if: inputs.component == 'loki'
        run: |
          ENV_FILE=infrastructure/environments/${{ inputs.environment }}/loki.yaml

          kubectl apply \
            -f infrastructure/loki/configmap.yaml \
            --namespace=monitoring-${{ inputs.environment }}

          yq e '
            .spec.template.spec.containers[0].resources.requests.cpu     = (load("'${ENV_FILE}'") | .resources.requests.cpu) |
            .spec.template.spec.containers[0].resources.requests.memory  = (load("'${ENV_FILE}'") | .resources.requests.memory) |
            .spec.template.spec.containers[0].resources.limits.cpu       = (load("'${ENV_FILE}'") | .resources.limits.cpu) |
            .spec.template.spec.containers[0].resources.limits.memory    = (load("'${ENV_FILE}'") | .resources.limits.memory) |
            .spec.volumeClaimTemplates[0].spec.resources.requests.storage = (load("'${ENV_FILE}'") | .storageSize)
          ' infrastructure/loki/statefulset.yaml | kubectl apply \
            -f - --namespace=monitoring-${{ inputs.environment }}

          kubectl apply \
            -f infrastructure/loki/service.yaml \
            --namespace=monitoring-${{ inputs.environment }}

      # ── Grafana ───────────────────────────────────────────────────────────

      - name: Create grafana secret
        if: inputs.component == 'grafana'
        env:
          GRAFANA_ADMIN_USER: ${{ secrets.GRAFANA_ADMIN_USER }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: |
          GRAFANA_HOST=$(yq '.host' infrastructure/environments/${{ inputs.environment }}/grafana.yaml)
          cat <<EOF > /tmp/grafana.env
          GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
          GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
          GF_SERVER_ROOT_URL=https://${GRAFANA_HOST}/grafana
          GF_SERVER_SERVE_FROM_SUB_PATH=true
          EOF
          kubectl create secret generic grafana-secret \
            --from-env-file=/tmp/grafana.env \
            --namespace=monitoring-${{ inputs.environment }} \
            --dry-run=client -o yaml | kubectl apply -f -
          rm /tmp/grafana.env

      - name: Deploy grafana
        if: inputs.component == 'grafana'
        run: |
          ENV_FILE=infrastructure/environments/${{ inputs.environment }}/grafana.yaml
          GRAFANA_HOST=$(yq '.host' ${ENV_FILE})
          CERT_ISSUER=$(yq '.certIssuer' ${ENV_FILE})
          export GRAFANA_HOST CERT_ISSUER

          kubectl apply \
            -f infrastructure/grafana/configmap.yaml \
            --namespace=monitoring-${{ inputs.environment }}

          yq e '
            .spec.resources.requests.storage = (load("'${ENV_FILE}'") | .storageSize)
          ' infrastructure/grafana/pvc.yaml | kubectl apply \
            -f - --namespace=monitoring-${{ inputs.environment }}

          yq e '
            .spec.template.spec.containers[0].resources.requests.cpu    = (load("'${ENV_FILE}'") | .resources.requests.cpu) |
            .spec.template.spec.containers[0].resources.requests.memory = (load("'${ENV_FILE}'") | .resources.requests.memory) |
            .spec.template.spec.containers[0].resources.limits.cpu      = (load("'${ENV_FILE}'") | .resources.limits.cpu) |
            .spec.template.spec.containers[0].resources.limits.memory   = (load("'${ENV_FILE}'") | .resources.limits.memory)
          ' infrastructure/grafana/deployment.yaml | kubectl apply \
            -f - --namespace=monitoring-${{ inputs.environment }}

          kubectl apply \
            -f infrastructure/grafana/service.yaml \
            --namespace=monitoring-${{ inputs.environment }}

          envsubst < infrastructure/grafana/ingress.yaml | kubectl apply \
            -f - --namespace=monitoring-${{ inputs.environment }}

      # ── Rollout verify ────────────────────────────────────────────────────

      - name: Verify rollout
        run: |
          RESOURCE_TYPE=${{ inputs.component == 'loki' && 'statefulset' || 'deployment' }}
          kubectl rollout status ${RESOURCE_TYPE}/${{ inputs.component }} \
            --namespace=monitoring-${{ inputs.environment }} \
            --timeout=5m
