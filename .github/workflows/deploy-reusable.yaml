name: Reusable - Deploy Helm Application

on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
      image_tag:
        required: true
        type: string
      environment:
        required: true
        type: string
      namespace:
        required: false
        type: string
        default: "default"
    secrets:
      KUBECONFIG:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout helm charts repository
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy ${{ inputs.app_name }} to ${{ inputs.environment }}
        run: |
          CHART_PATH="charts/${{ inputs.app_name }}"
          DEFAULT_VALUES="charts/${{ inputs.app_name }}/values.yaml"
          ENV_VALUES="environments/${{ inputs.environment }}/${{ inputs.app_name }}.yaml"

          if [ ! -d "$CHART_PATH" ]; then
            echo "❌ Error: Chart directory $CHART_PATH not found!"
            ls -la charts/
            exit 1
          fi

          if [ -f "$ENV_VALUES" ]; then
            VALUES_ARGS="-f $DEFAULT_VALUES -f $ENV_VALUES"
            echo "Using environment values: $ENV_VALUES"
          else
            VALUES_ARGS="-f $DEFAULT_VALUES"
            echo "Warning: Environment values not found, using only default values"
          fi

          echo "🚀 Deploying ${{ inputs.app_name }} → ${{ inputs.environment }}"
          echo "Image tag     : ${{ inputs.image_tag }}"
          echo "Chart path    : $CHART_PATH"

          helm upgrade --install ${{ inputs.app_name }} ./$CHART_PATH \
            --namespace ${{ inputs.namespace }} \
            --create-namespace \
            $VALUES_ARGS \
            --set image.tag=${{ inputs.image_tag }} \
            --wait \
            --timeout 10m0s \
            --atomic

          echo "✅ Successfully deployed ${{ inputs.app_name }} to ${{ inputs.environment }}"