name: Reusable - Deploy Helm Application

on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
      image_tag:
        required: true
        type: string
      environment:
        required: true
        type: string
      namespace:
        required: false
        type: string
        default: "default"
    secrets:
      KUBECONFIG:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Helm repository
        uses: actions/checkout@v4
        with:
          repository: pavelsamodurov/entropy-infra-helm-charts
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy ${{ inputs.app_name }} to ${{ inputs.environment }}
        run: |
          CHART_PATH="charts/${{ inputs.app_name }}"
          DEFAULT_VALUES="${CHART_PATH}/values.yaml"
          ENV_VALUES="environments/${{ inputs.environment }}/${{ inputs.app_name }}.yaml"

          echo "📁 Chart: $CHART_PATH"
          echo "📄 default values: $DEFAULT_VALUES"
          echo "📄 env values: $ENV_VALUES"

          if [ ! -d "$CHART_PATH" ]; then
            echo "❌ Chart not found: $CHART_PATH"
            exit 1
          fi

          if [ -f "$ENV_VALUES" ]; then
            VALUES_ARGS="-f $DEFAULT_VALUES -f $ENV_VALUES"
          else
            echo "⚠️ Environment values file missing → using only default values"
            VALUES_ARGS="-f $DEFAULT_VALUES"
          fi

          echo "🚀 helm upgrade --install ..."
          helm upgrade --install ${{ inputs.app_name }} $CHART_PATH \
            --namespace ${{ inputs.namespace }} \
            --create-namespace \
            $VALUES_ARGS \
            --set image.tag=${{ inputs.image_tag }} \
            --wait \
            --timeout 10m \
            --atomic

          echo "✅ Deployment completed."