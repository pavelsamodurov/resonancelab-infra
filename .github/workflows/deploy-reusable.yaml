name: Deploy (Reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target environment (dev | prod)'
        required: true
        type: string
      image_tag:
        description: 'Docker image tag to deploy'
        required: true
        type: string
      service_name:
        description: 'Service name (matches chart folder and values file)'
        required: true
        type: string
    secrets:
      KUBECONFIG:
        description: 'Base64-encoded kubeconfig for target cluster'
        required: true

  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (dev | prod)'
        required: true
        type: choice
        options:
          - dev
          - prod
      image_tag:
        description: 'Docker image tag to deploy'
        required: true
        type: string
      service_name:
        description: 'Service name'
        required: true
        type: string
        default: 'ai-gateway'

jobs:
  deploy:
    name: Helm deploy → ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout infra charts
        uses: actions/checkout@v4
        with:
          repository: pavelsamodurov/entropy-infra-helm-charts
          ref: main

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Debug kubeconfig secret
        run: |
          echo "Length: $(echo '${{ secrets.KUBECONFIG }}' | wc -c)"
          echo "First 20 chars: $(echo '${{ secrets.KUBECONFIG }}' | cut -c1-20)"
          echo '${{ secrets.KUBECONFIG }}' | base64 -d 2>&1 | head -3 || true

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Helm upgrade
        run: |
          helm upgrade --install ${{ inputs.service_name }} \
            ./charts/${{ inputs.service_name }} \
            --values ./environments/${{ inputs.environment }}/${{ inputs.service_name }}.yaml \
            --set image.tag=${{ inputs.image_tag }} \
            --namespace ${{ inputs.environment }} \
            --create-namespace \
            --rollback-on-failure \
            --timeout 5m \
            --wait

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/${{ inputs.service_name }} \
            --namespace ${{ inputs.environment }} \
            --timeout=3m