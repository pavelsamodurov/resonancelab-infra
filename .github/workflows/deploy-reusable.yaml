name: Deploy (Reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target environment (dev | prod)'
        required: true
        type: string
      image_tag:
        description: 'Docker image tag to deploy'
        required: true
        type: string
      service_name:
        description: 'Service name (matches chart folder and values file)'
        required: true
        type: string
      recreate:
        description: 'Teardown component before deploying (frees resources)'
        required: false
        type: boolean
        default: false
      timeout:
        description: 'Helm upgrade timeout (e.g. 5m, 10m)'
        required: false
        type: string
        default: '5m'
    secrets:
      KUBECONFIG:
        description: 'Base64-encoded kubeconfig for target cluster'
        required: true
      DEEPSEEK_API_KEY:
        description: 'DeepSeek API key'
        required: true
      GROQ_API_KEY:
        description: 'Groq API key'
        required: true
      DEEPINFRA_API_KEY:
        description: 'DeepInfra API key'
        required: true
      POSTGRES_USER:
        description: 'Postgres user'
        required: true
      POSTGRES_PASSWORD:
        description: 'Postgres password'
        required: true
      STT_MAX_TOKEN:
        description: 'STT max token'
        required: true

  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (dev | prod)'
        required: true
        type: choice
        options:
          - dev
          - prod
      image_tag:
        description: 'Docker image tag to deploy'
        required: true
        type: string
      service_name:
        description: 'Service name'
        required: true
        type: string
        default: 'ai-gateway'
      recreate:
        description: 'Teardown before deploy (frees resources)'
        required: false
        type: boolean
        default: false
      timeout:
        description: 'Helm upgrade timeout (e.g. 5m, 10m)'
        required: false
        type: string
        default: '5m'

jobs:
  deploy:
    name: Helm deploy → ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout infra charts
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          repository: pavelsamodurov/resonancelab-infra
          ref: main

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Recreate (uninstall existing release)
        if: inputs.recreate
        run: |
          echo "🔄 Recreate enabled — uninstalling existing release..."
          helm uninstall ${{ inputs.service_name }} \
            --namespace ${{ inputs.environment }} \
            --ignore-not-found \
            --wait \
            --timeout 2m || true

      - name: Helm upgrade
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEEPINFRA_API_KEY: ${{ secrets.DEEPINFRA_API_KEY }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          STT_MAX_TOKEN: ${{ secrets.STT_MAX_TOKEN }}
        run: |
          helm upgrade --install ${{ inputs.service_name }} \
            ./charts/${{ inputs.service_name }} \
            --values ./environments/${{ inputs.environment }}/${{ inputs.service_name }}.yaml \
            --set image.tag=${{ inputs.image_tag }} \
            --set-string deepseekApiKey="${DEEPSEEK_API_KEY}" \
            --set-string groqApiKey="${GROQ_API_KEY}" \
            --set-string deepinfraApiKey="${DEEPINFRA_API_KEY}" \
            --set-string postgresUser="${POSTGRES_USER}" \
            --set-string postgresPassword="${POSTGRES_PASSWORD}" \
            --set-string sttMaxToken="${STT_MAX_TOKEN}" \
            --set-file applicationConfig=./environments/${{ inputs.environment }}/application-env.yaml \
            --namespace ${{ inputs.environment }} \
            --create-namespace \
            --atomic \
            --timeout ${{ inputs.timeout }} \
            --wait

          echo "✅ Deployment completed successfully."

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/${{ inputs.service_name }} \
            --namespace ${{ inputs.environment }} \
            --timeout=3m