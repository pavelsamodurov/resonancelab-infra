name: Helm Lint

on:
  pull_request:
    paths:
      - 'charts/**'
      - 'environments/**'
  workflow_dispatch:

jobs:
  lint:
    name: Helm lint and dry-run
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0

      - name: Lint chart
        run: helm lint charts/ai-gateway

      - name: Dry-run dev
        run: |
          helm template ai-gateway charts/ai-gateway \
            --values environments/dev/ai-gateway.yaml \
            --set-file applicationConfig=environments/dev/application-env.yaml \
            --set image.tag=dry-run

      - name: Dry-run prod
        run: |
          helm template ai-gateway charts/ai-gateway \
            --values environments/prod/ai-gateway.yaml \
            --set-file applicationConfig=environments/prod/application-env.yaml \
            --set image.tag=dry-run