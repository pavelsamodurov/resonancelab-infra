name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (dev | prod)'
        required: true
        type: choice
        options:
          - dev
          - prod
      component:
        description: 'Infrastructure component to deploy'
        required: true
        type: choice
        options:
          - postgres
          - pgadmin
          - ollama
          - dashboard
      recreate:
        description: 'Teardown component before deploying (frees resources)'
        required: false
        type: boolean
        default: false

jobs:
  deploy:
    name: Deploy ${{ inputs.component }} → ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read

    steps:
      - name: Checkout infra charts
        uses: actions/checkout@v6
        with:
          repository: pavelsamodurov/resonancelab-infra
          ref: main

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Teardown before deploy
        if: inputs.recreate == true && inputs.component != 'dashboard'
        run: |
          kubectl delete -f infrastructure/${{ inputs.component }}/ \
            --namespace=${{ inputs.environment }} \
            --ignore-not-found
          kubectl delete secret ${{ inputs.component }}-secret \
            --namespace=${{ inputs.environment }} \
            --ignore-not-found
          kubectl delete configmap ${{ inputs.component }}-config \
            --namespace=${{ inputs.environment }} \
            --ignore-not-found

      - name: Create namespace
        if: inputs.component != 'dashboard'
        run: |
          kubectl create namespace ${{ inputs.environment }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create postgres secret
        if: inputs.component == 'postgres'
        env:
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          cat <<EOF > /tmp/postgres.env
          POSTGRES_DB=${POSTGRES_DB}
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          EOF
          kubectl create secret generic postgres-secret \
            --from-env-file=/tmp/postgres.env \
            --namespace=${{ inputs.environment }} \
            --dry-run=client -o yaml | kubectl apply -f -
          rm /tmp/postgres.env

      - name: Create pgadmin secret
        if: inputs.component == 'pgadmin'
        env:
          PGADMIN_DEFAULT_EMAIL: ${{ secrets.PGADMIN_DEFAULT_EMAIL }}
          PGADMIN_DEFAULT_PASSWORD: ${{ secrets.PGADMIN_DEFAULT_PASSWORD }}
        run: |
          cat <<EOF > /tmp/pgadmin.env
          PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
          PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
          SCRIPT_NAME=/pgadmin
          EOF
          kubectl create secret generic pgadmin-secret \
            --from-env-file=/tmp/pgadmin.env \
            --namespace=${{ inputs.environment }} \
            --dry-run=client -o yaml | kubectl apply -f -
          rm /tmp/pgadmin.env

      - name: Create ollama configmap
        if: inputs.component == 'ollama'
        run: |
          OLLAMA_MODEL=$(yq '.model' infrastructure/environments/${{ inputs.environment }}/ollama.yaml)
          kubectl create configmap ollama-config \
            --from-literal=OLLAMA_MODEL=${OLLAMA_MODEL} \
            --namespace=${{ inputs.environment }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy postgres
        if: inputs.component == 'postgres'
        run: |
          kubectl apply \
            -f infrastructure/postgres/ \
            --namespace=${{ inputs.environment }}

      - name: Deploy pgadmin
        if: inputs.component == 'pgadmin'
        run: |
          PGADMIN_HOST=$(yq '.host' infrastructure/environments/${{ inputs.environment }}/pgadmin.yaml)
          TLS_SECRET=${{ inputs.environment == 'prod' && 'resonancelab-tls' || 'dev-resonancelab-tls' }}
          export PGADMIN_HOST TLS_SECRET
          envsubst < infrastructure/pgadmin/ingress.yaml | kubectl apply \
            -f - --namespace=${{ inputs.environment }}
          kubectl apply \
            -f infrastructure/pgadmin/deployment.yaml \
            -f infrastructure/pgadmin/service.yaml \
            --namespace=${{ inputs.environment }}

      - name: Deploy ollama
        if: inputs.component == 'ollama'
        run: |
          ENV_FILE=infrastructure/environments/${{ inputs.environment }}/ollama.yaml
          yq e '
            .spec.template.spec.containers[0].resources.requests.cpu = (load("'${ENV_FILE}'") | .resources.requests.cpu) |
            .spec.template.spec.containers[0].resources.requests.memory = (load("'${ENV_FILE}'") | .resources.requests.memory) |
            .spec.template.spec.containers[0].resources.limits.cpu = (load("'${ENV_FILE}'") | .resources.limits.cpu) |
            .spec.template.spec.containers[0].resources.limits.memory = (load("'${ENV_FILE}'") | .resources.limits.memory)
          ' infrastructure/ollama/deployment.yaml | kubectl apply \
            -f - --namespace=${{ inputs.environment }}
          kubectl apply \
            -f infrastructure/ollama/pvc.yaml \
            -f infrastructure/ollama/service.yaml \
            --namespace=${{ inputs.environment }}

      - name: Deploy dashboard
        if: inputs.component == 'dashboard'
        run: |
          DASHBOARD_HOST=$(yq '.host' infrastructure/environments/${{ inputs.environment }}/dashboard.yaml)
          TLS_SECRET=${{ inputs.environment == 'prod' && 'resonancelab-tls' || 'dev-resonancelab-tls' }}

          kubectl apply -f infrastructure/dashboard/namespace.yaml
          kubectl apply -f infrastructure/dashboard/serviceaccount.yaml

          curl -fsSL https://raw.githubusercontent.com/kubernetes/dashboard/v3.0.0/charts/kubernetes-dashboard.yaml \
            | kubectl apply -f -

          export DASHBOARD_HOST TLS_SECRET
          envsubst < infrastructure/dashboard/ingress.yaml | kubectl apply -f -

      - name: Print dashboard token
        if: inputs.component == 'dashboard'
        run: |
          echo "===== Dashboard access token ====="
          kubectl get secret admin-user-token \
            -n kubernetes-dashboard \
            -o jsonpath='{.data.token}' | base64 -d
          echo ""
          echo "=================================="

      - name: Verify rollout
        if: inputs.component != 'dashboard'
        run: |
          RESOURCE_TYPE=${{ inputs.component == 'postgres' && 'statefulset' || 'deployment' }}
          kubectl rollout status ${RESOURCE_TYPE}/${{ inputs.component }} \
            --namespace=${{ inputs.environment }} \
            --timeout=10m