name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (dev | prod)'
        required: true
        type: choice
        options:
          - dev
          - prod
      component:
        description: 'Infrastructure component to deploy'
        required: true
        type: choice
        options:
          - postgres
          - pgadmin

jobs:
  deploy:
    name: Deploy ${{ inputs.component }} → ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read

    steps:
      - name: Checkout infra charts
        uses: actions/checkout@v6
        with:
          repository: pavelsamodurov/entropy-infra-helm-charts
          ref: main

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Create namespace
        run: |
          kubectl create namespace ${{ inputs.environment }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create postgres secret
        if: inputs.component == 'postgres'
        run: |
          kubectl create secret generic postgres-secret \
            --from-literal=POSTGRES_DB=${{ secrets.POSTGRES_DB }} \
            --from-literal=POSTGRES_USER=${{ secrets.POSTGRES_USER }} \
            --from-literal=POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            --namespace=${{ inputs.environment }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create pgadmin secret
        if: inputs.component == 'pgadmin'
        run: |
          kubectl create secret generic pgadmin-secret \
            --from-literal=PGADMIN_DEFAULT_EMAIL=${{ secrets.PGADMIN_DEFAULT_EMAIL }} \
            --from-literal=PGADMIN_DEFAULT_PASSWORD=${{ secrets.PGADMIN_DEFAULT_PASSWORD }} \
            --from-literal=SCRIPT_NAME=/pgadmin \
            --namespace=${{ inputs.environment }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy postgres
        if: inputs.component == 'postgres'
        run: |
          kubectl apply \
            -f infrastructure/postgres/ \
            --namespace=${{ inputs.environment }}

      - name: Deploy pgadmin
        if: inputs.component == 'pgadmin'
        run: |
          source infrastructure/environments/${{ inputs.environment }}/pgadmin.env
          TLS_SECRET=${{ inputs.environment == 'prod' && 'resonancelab-tls' || 'dev-resonancelab-tls' }}
          export PGADMIN_HOST TLS_SECRET
          envsubst < infrastructure/pgadmin/ingress.yaml | kubectl apply \
            -f - --namespace=${{ inputs.environment }}

          kubectl apply \
            -f infrastructure/pgadmin/deployment.yaml \
            -f infrastructure/pgadmin/service.yaml \
            --namespace=${{ inputs.environment }}

      - name: Verify rollout
        run: |
          kubectl rollout status ${{ inputs.component == 'postgres' && 'statefulset' || 'deployment' }}/${{ inputs.component }} \
            --namespace=${{ inputs.environment }} \
            --timeout=5m