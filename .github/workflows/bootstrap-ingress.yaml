name: Bootstrap Ingress

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (dev | prod)'
        required: true
        type: choice
        options:
          - dev
          - prod

jobs:
  bootstrap:
    name: Bootstrap ingress → ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read

    steps:
      - name: Set up Helm
        uses: azure/setup-helm@v5.0.0

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Install ingress-nginx
        run: |
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo update
          helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
            --namespace ingress-nginx \
            --create-namespace \
            --set controller.replicaCount=1 \
            --atomic \
            --timeout 5m \
            --wait

      - name: Create namespace
        run: |
          kubectl create namespace ${{ inputs.environment }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create TLS secret
        run: |
          TLS_SECRET_NAME=${{ inputs.environment == 'prod' && 'resonancelab-tls' || 'dev-resonancelab-tls' }}
          kubectl create secret tls ${TLS_SECRET_NAME} \
            --cert=<(echo "${{ secrets.TLS_CERT }}") \
            --key=<(echo "${{ secrets.TLS_KEY }}") \
            --namespace=${{ inputs.environment }} \
            --dry-run=client -o yaml | kubectl apply -f -