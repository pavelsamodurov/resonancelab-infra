name: Deploy Uptime Kuma

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Uptime Kuma → status.resonancelab.cc
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: status.resonancelab.cc
          username: ${{ secrets.STATUS_VPS_USER }}
          key: ${{ secrets.STATUS_VPS_SSH_KEY }}
          source: "infrastructure/uptime-kuma/"
          target: "~/uptime-kuma"
          strip_components: 2

      - name: Write .env and start services
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: status.resonancelab.cc
          username: ${{ secrets.STATUS_VPS_USER }}
          key: ${{ secrets.STATUS_VPS_SSH_KEY }}
          script: |
            cat > ~/uptime-kuma/.env <<'EOF'
            CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}
            EOF
            cd ~/uptime-kuma
            docker compose up -d --build
